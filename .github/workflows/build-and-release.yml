name: Build and Release

on:
  pull_request:
    branches: [master]

  push:
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x64, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -A ${{ matrix.arch }} -B build-${{ matrix.arch }} .

      - name: Build
        run: cmake --build build-${{ matrix.arch }} --config Release

      - name: Package (ZIP)
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build-${{ matrix.arch }}/Release/* `
            -DestinationPath ntop-${{ matrix.arch }}.zip

      - name: Upload build artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: ntop-${{ matrix.arch }}
          path: ntop-${{ matrix.arch }}.zip

      - name: Upload release assets (only on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ntop-${{ matrix.arch }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
